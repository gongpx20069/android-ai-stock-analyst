name: Release APK

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-1.0
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Require main branch
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Releases must run from main." >&2
            exit 1
          fi

      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK 36
        shell: bash
        run: |
          android_sdk="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          sdkmanager_path="${android_sdk}/cmdline-tools/latest/bin/sdkmanager"
          if [[ ! -x "${sdkmanager_path}" ]]; then
            sdkmanager_path="$(find "${android_sdk}/cmdline-tools" -type f -name sdkmanager | head -n 1)"
          fi
          if [[ -z "${sdkmanager_path}" || ! -x "${sdkmanager_path}" ]]; then
            echo "sdkmanager was not found under ${android_sdk}." >&2
            exit 1
          fi
          yes | "${sdkmanager_path}" --licenses >/dev/null 2>&1 || true
          "${sdkmanager_path}" "platforms;android-36" "build-tools;36.0.0"

      - name: Determine next 1.0.x version
        id: version
        shell: bash
        run: |
          git fetch origin main --tags --force
          max_patch=-1
          while IFS= read -r tag; do
            if [[ "${tag}" =~ ^v1\.0\.([0-9]+)$ ]]; then
              patch="${BASH_REMATCH[1]}"
              if (( patch > max_patch )); then
                max_patch="${patch}"
              fi
            fi
          done < <(git tag --list "v1.0.*")

          next_patch=$((max_patch + 1))
          if (( next_patch > 999 )); then
            echo "The 1.0.x patch range is exhausted." >&2
            exit 1
          fi
          version_name="1.0.${next_patch}"
          version_code=$((1000000 + next_patch))
          echo "name=${version_name}" >> "${GITHUB_OUTPUT}"
          echo "code=${version_code}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version_name}" >> "${GITHUB_OUTPUT}"

      - name: Validate signing secrets
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          for value in KEYSTORE_BASE64 STORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [[ -z "${!value}" ]]; then
              echo "Missing GitHub Actions signing secret: ${value}" >&2
              exit 1
            fi
          done

      - name: Decode release keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          printf "%s" "${KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/release-signing.jks"

      - name: Build signed release APK
        shell: bash
        env:
          ANDROID_RELEASE_STORE_FILE: ${{ runner.temp }}/release-signing.jks
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew lint test :app:assembleRelease \
            -PreleaseVersionName="${{ steps.version.outputs.name }}" \
            -PreleaseVersionCode="${{ steps.version.outputs.code }}"

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p build/release
          filename="ai-stock-analyst-${{ steps.version.outputs.name }}.apk"
          cp app/build/outputs/apk/release/app-release.apk "build/release/${filename}"
          (
            cd build/release
            sha256sum "${filename}" > "${filename}.sha256"
          )

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch origin --tags --force
          tag="${{ steps.version.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "${tag} was created while this build was running. Rerun for the next patch." >&2
            exit 1
          fi
          gh release create "${tag}" \
            "build/release/ai-stock-analyst-${{ steps.version.outputs.name }}.apk" \
            "build/release/ai-stock-analyst-${{ steps.version.outputs.name }}.apk.sha256" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "AI Stock Analyst ${{ steps.version.outputs.name }}" \
            --generate-notes
